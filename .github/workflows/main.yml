name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]

    env:
      CMAKE_VERSION: 3.18.4
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs='-Xmx6g -Dfile.encoding=UTF-8'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-multilib \
            python3 \
            unzip \
            pkg-config \
            p7zip-full \
            curl

      - name: Install CMake ${{ env.CMAKE_VERSION }}
        shell: bash
        run: |
          set -euxo pipefail
          cd "$RUNNER_TEMP"
          curl -L --retry 5 --retry-delay 3 \
            -o cmake.tar.gz \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz"
          tar -xzf cmake.tar.gz
          echo "$RUNNER_TEMP/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> "$GITHUB_PATH"
          cmake --version

      - name: Build native libraries
        shell: bash
        run: |
          set -euxo pipefail
          cd buildscripts
          chmod +x ./*.sh ./include/*.sh || true
          ./build.sh --arch "${{ matrix.arch }}"

      - name: Build APK
        shell: bash
        run: |
          set -euxo pipefail
          export ARCH="${{ matrix.arch }}"
          source buildscripts/include/version.sh
          sed -i "s/abiFilters.*/abiFilters '$ABI'/" app/build.gradle
          export ANDROID_NDK_HOME="$GITHUB_WORKSPACE/buildscripts/toolchain/ndk"
          ./gradlew --no-daemon assembleNightlyDebug

      - name: Compress symbols
        shell: bash
        run: |
          set -euxo pipefail
          cd buildscripts
          ./package-symbols.sh
          mv symbols.7z "../symbols-$(git rev-parse --short "$GITHUB_SHA")-${{ matrix.arch }}.7z"

      - name: Collect outputs
        id: outputs
        shell: bash
        run: |
          set -euxo pipefail
          APK_FILE="omw-debug-$(git rev-parse --short "$GITHUB_SHA")-${{ matrix.arch }}.apk"
          SYMBOLS_FILE="symbols-$(git rev-parse --short "$GITHUB_SHA")-${{ matrix.arch }}.7z"
          mv app/build/outputs/apk/nightly/debug/omw_debug_*.apk "$APK_FILE"
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"
          echo "symbols_file=$SYMBOLS_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.outputs.outputs.apk_file }}
          path: ${{ steps.outputs.outputs.apk_file }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.outputs.outputs.symbols_file }}
          path: ${{ steps.outputs.outputs.symbols_file }}
          retention-days: 14
          if-no-files-found: error
